<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nueva Contraseña - Vantec Core</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        vantec: {
                            primary: '#1E3A5F',
                            accent: '#4EBCE9',
                        }
                    }
                }
            }
        }
    </script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>

<body class="bg-vantec-primary min-h-screen flex items-center justify-center p-4">
    <div
        class="bg-white rounded-2xl shadow-2xl w-full max-w-md overflow-hidden transition-all duration-300 hover:shadow-vantec-accent/20">
        
        <div class="bg-white p-8 text-center border-b border-gray-100">
            <div class="flex justify-center items-center gap-3 mb-4">
                <img src="/static/img/Logo_Escudo_Sin_Fondo.png" class="h-12 w-auto object-contain"
                    alt="Logo Vantec">
                <div class="flex items-center space-x-1 px-3 py-1.5 border-2 border-vantec-primary rounded-xl">
                    <span class="text-xl font-black text-vantec-primary">VANTEC</span>
                    <span class="text-xl font-light text-vantec-accent">CORE</span>
                </div>
            </div>
            <h2 class="text-lg font-bold text-vantec-primary uppercase tracking-tight">Establecer Nueva Contraseña</h2>
            <p class="text-[10px] text-gray-400 mt-1 uppercase font-black tracking-widest text-[#4EBCE9]">L6 Core Intelligence v3.5</p>
        </div>

        <div id="alertBox" class="hidden mx-8 mt-6 p-4 rounded-lg text-sm text-center"></div>

        <form id="resetForm" class="p-8 space-y-6">
            <input type="hidden" id="token" name="token">
            
            <div class="space-y-4">
                <div>
                    <label for="password" class="block text-sm font-medium text-gray-700 mb-2">Nueva Contraseña</label>
                    <div class="relative">
                        <span class="absolute inset-y-0 left-0 pl-3 flex items-center text-gray-400">
                            <i class="fas fa-lock text-xs"></i>
                        </span>
                        <input type="password" id="password" name="password" required minlength="8"
                            class="block w-full pl-10 pr-3 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-vantec-accent focus:border-vantec-accent outline-none transition-all placeholder-gray-300"
                            placeholder="••••••••">
                    </div>
                </div>

                <div>
                    <label for="confirm_password" class="block text-sm font-medium text-gray-700 mb-2">Confirmar Contraseña</label>
                    <div class="relative">
                        <span class="absolute inset-y-0 left-0 pl-3 flex items-center text-gray-400">
                            <i class="fas fa-check-double text-xs"></i>
                        </span>
                        <input type="password" id="confirm_password" required minlength="8"
                            class="block w-full pl-10 pr-3 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-vantec-accent focus:border-vantec-accent outline-none transition-all placeholder-gray-300"
                            placeholder="••••••••">
                    </div>
                </div>
            </div>

            <!-- Requisitos Visuales L6 Hardening -->
            <div class="grid grid-cols-2 gap-2 text-[8px] uppercase tracking-tighter text-gray-400 font-black mb-4">
                 <p id="req-len" class="flex items-center gap-1"><i class="fas fa-circle text-[4px]"></i> 8+ Caracteres</p>
                 <p id="req-upper" class="flex items-center gap-1"><i class="fas fa-circle text-[4px]"></i> Mayúscula</p>
                 <p id="req-num" class="flex items-center gap-1"><i class="fas fa-circle text-[4px]"></i> Número</p>
                 <p id="req-spec" class="flex items-center gap-1"><i class="fas fa-circle text-[4px]"></i> Carácter Especial</p>
            </div>

            <button type="submit" id="submitBtn"
                class="w-full bg-vantec-primary text-white py-3 rounded-lg font-bold hover:bg-vantec-primary/90 hover:scale-[1.02] active:scale-[0.98] transition-all shadow-lg shadow-vantec-primary/20">
                Guardar Nueva Contraseña
            </button>

            <div class="text-center pt-2">
                <a href="/login" class="text-sm text-vantec-accent hover:underline font-medium">Volver al Inicio de Sesión</a>
            </div>
        </form>

        <div class="p-6 bg-white text-center border-t border-gray-100">
            <p class="text-[10px] text-gray-400 uppercase tracking-widest mb-1">Protección por Tokenización Atómica</p>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script>
        // Obtener token de la URL
        const urlParams = new URLSearchParams(window.location.search);
        const tokenToken = urlParams.get('token');
        if (!tokenToken) {
            Swal.fire({
                icon: 'error',
                title: 'Token Ausente',
                text: 'El enlace de recuperación parece ser inválido.',
                confirmButtonColor: '#1E3A5F'
            }).then(() => window.location.href = '/login');
        } else {
            document.getElementById('token').value = tokenToken;
        }

        document.getElementById('resetForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const password = document.getElementById('password').value;
            const confirm = document.getElementById('confirm_password').value;
            const token = document.getElementById('token').value;
            const btn = document.getElementById('submitBtn');
            const alertBox = document.getElementById('alertBox');

            if (password !== confirm) {
                alertBox.innerText = "Las contraseñas no coinciden.";
                alertBox.className = "mx-8 mt-6 p-4 rounded-lg text-sm text-center bg-red-50 text-red-700 border border-red-100 block";
                return;
            }

            btn.disabled = true;
            btn.innerHTML = '<i class="fas fa-circle-notch fa-spin mr-2"></i> Guardando...';
            alertBox.classList.add('hidden');

            try {
                const response = await fetch('/api/v1/auth/reset-password', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ token, password })
                });

                const data = await response.json();
                
                if (response.ok) {
                    Swal.fire({
                        icon: 'success',
                        title: '🔒 Contraseña Actualizada',
                        text: 'Su acceso ha sido restaurado. Por favor, inicie sesión con su nueva contraseña.',
                        confirmButtonText: 'Ir a Login',
                        confirmButtonColor: '#4EBCE9',
                        allowOutsideClick: false
                    }).then(() => {
                        window.location.href = '/login';
                    });
                } else {
                    alertBox.innerText = data.detail || "Error al actualizar.";
                    alertBox.className = "mx-8 mt-6 p-4 rounded-lg text-sm text-center bg-red-50 text-red-700 border border-red-100 block";
                }
            } catch (error) {
                alertBox.innerText = "Error de red o servidor.";
                alertBox.className = "mx-8 mt-6 p-4 rounded-lg text-sm text-center bg-red-50 text-red-700 border border-red-100 block";
            } finally {
                btn.disabled = false;
                btn.innerText = 'Guardar Nueva Contraseña';
            }
        });
    </script>
</body>
</html>
