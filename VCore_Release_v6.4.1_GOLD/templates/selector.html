<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Seleccionar Empresa - Vantec Core</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        vantec: { primary: '#1E3A5F', accent: '#4EBCE9' }
                    }
                }
            }
        }
    </script>
    <style>
        .selector-card:hover { transform: translateY(-5px); }
    </style>
</head>
<body class="bg-vantec-primary min-h-screen flex items-center justify-center p-6">
    <!-- Header de Identidad (Neutral) -->
    <header class="fixed top-0 left-0 right-0 h-16 bg-white/10 backdrop-blur-md border-b border-white/5 flex items-center justify-between px-8 z-50">
        <div class="flex items-center gap-3">
            <img src="/static/img/Logo_Escudo_Sin_Fondo.png" class="h-8 w-auto" alt="Logo">
            <span class="text-white font-black tracking-tighter">VCORE</span>
        </div>
        <div class="flex items-center gap-4 text-white">
            <div class="text-right">
                <p class="text-[10px] uppercase font-black tracking-widest text-vantec-accent" id="userName">Identificando...</p>
                <button onclick="logout()" class="text-[10px] text-red-400 font-bold hover:underline">Cerrar Sesión</button>
            </div>
            <div class="h-8 w-8 rounded-lg bg-white/20 flex items-center justify-center">
                <i class="fas fa-user-circle"></i>
            </div>
        </div>
    </header>

    <div class="max-w-4xl w-full pt-20">
        <div class="text-center mb-10">
             <div class="flex justify-center items-center gap-3 mb-6">
                <img src="/static/img/Logo_Escudo_Sin_Fondo.png" class="h-16 w-auto" alt="Logo Vantec">
                <div class="flex items-center space-x-1 px-4 py-2 border-2 border-white/20 rounded-xl">
                    <span class="text-2xl font-black text-white">VANTEC</span>
                    <span class="text-2xl font-light text-vantec-accent">CORE</span>
                </div>
            </div>
            <h1 class="text-3xl font-bold text-white mb-2">Seleccionar Empresa</h1>
            <p class="text-blue-200">Elija la entidad con la que desea operar en esta sesión.</p>
        </div>

        <div id="entities-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
            <!-- Dinamically injected -->
        </div>

        <!-- Acceso Global para SuperAdmin (VCORE L3) -->
        <div id="admin-global-access" class="hidden mt-12 pt-8 border-t border-white/10 text-center">
            <p class="text-white/40 text-xs uppercase tracking-[0.2em] font-black mb-4">Governance & Infrastructure</p>
            <a href="/configuracion" class="inline-flex items-center gap-3 px-8 py-4 bg-white/10 hover:bg-white/20 text-vantec-accent rounded-2xl border border-white/10 transition-all duration-300 group">
                <i class="fas fa-tools group-hover:rotate-12 transition-transform"></i>
                <span class="font-bold tracking-tight">Ir al Panel de Administración Global</span>
            </a>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="/static/js/auth.js"></script>
    <script src="/static/js/sentinel.js?v=3.5.0"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
             const payload = getUserPayload();
             const grid = document.getElementById('entities-grid');
             const adminGlobal = document.getElementById('admin-global-access');
             const userNameHeader = document.getElementById('userName');

             if (!payload) {
                 window.location.href = '/login';
                 return;
             }
             
             // Sync Header Identity (Neutral Zone)
             if(userNameHeader) userNameHeader.innerText = payload.username.toUpperCase();
             
             // Global Admin Access (L3 Standard)
             if (payload.is_superadmin && adminGlobal) {
                 adminGlobal.classList.remove('hidden');
             }

             if (!payload.entidades || payload.entidades.length === 0) {
                 if(!payload.is_superadmin) window.location.href = '/login';
                 else grid.innerHTML = '<div class="col-span-full py-12 text-center text-white/20 italic">No hay RFCs registrados aún. Use el Panel de Administración Global.</div>';
                 return;
             }

             payload.entidades.forEach(entidad => {
                 const card = document.createElement('div');
                 card.className = "selector-card bg-white rounded-2xl p-6 shadow-xl cursor-pointer transition-all duration-300 hover:shadow-2xl hover:shadow-vantec-accent/20 border border-transparent hover:border-vantec-accent";
                 
                 const logoHtml = entidad.logo_url 
                    ? `<img src="${entidad.logo_url}" class="h-12 w-auto object-contain mb-4" alt="Logo">`
                    : `<div class="p-3 bg-gray-50 text-vantec-primary rounded-xl w-fit mb-4"><i class="fas fa-building fa-2x"></i></div>`;

                 card.innerHTML = `
                    <div class="flex flex-col h-full">
                        ${logoHtml}
                        <h3 class="text-lg font-bold text-vantec-primary truncate mb-1">${entidad.razon_social}</h3>
                        <p class="text-sm font-mono text-gray-400 mb-4">${entidad.rfc}</p>
                        <div class="mt-auto pt-4 border-t border-gray-50 flex items-center justify-between">
                            <span class="px-2 py-1 bg-blue-50 text-vantec-primary rounded text-[10px] font-bold uppercase tracking-widest">${entidad.rol}</span>
                            <i class="fas fa-arrow-right text-gray-300"></i>
                        </div>
                    </div>
                 `;
                 
                 card.onclick = () => {
                     setActiveEntidad(entidad.id);
                     window.location.href = '/dashboard';
                 };
                 
                 grid.appendChild(card);
             });
        });
    </script>
</body>
</html>
