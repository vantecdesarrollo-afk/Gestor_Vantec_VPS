<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recuperar Contraseña - Vantec Core</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        vantec: {
                            primary: '#1E3A5F',
                            accent: '#4EBCE9',
                        }
                    }
                }
            }
        }
    </script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>

<body class="bg-vantec-primary min-h-screen flex items-center justify-center p-4">
    <div
        class="bg-white rounded-2xl shadow-2xl w-full max-w-md overflow-hidden transition-all duration-300 hover:shadow-vantec-accent/20">
        
        <div class="bg-white p-8 text-center border-b border-gray-100">
            <div class="flex justify-center items-center gap-3 mb-4">
                <img src="/static/img/Logo_Escudo_Sin_Fondo.png" class="h-12 w-auto object-contain"
                    alt="Logo Vantec">
                <div class="flex items-center space-x-1 px-3 py-1.5 border-2 border-vantec-primary rounded-xl">
                    <span class="text-xl font-black text-vantec-primary">VANTEC</span>
                    <span class="text-xl font-light text-vantec-accent">CORE</span>
                </div>
            </div>
            <h2 class="text-lg font-bold text-vantec-primary uppercase tracking-tight">Recuperar Acceso</h2>
            <p class="text-xs text-gray-400 mt-1">Ingrese su correo electrónico para recibir un enlace de recuperación.</p>
        </div>

        <div id="alertBox" class="hidden mx-8 mt-6 p-4 rounded-lg text-sm text-center"></div>

        <form id="recoveryForm" class="p-8 space-y-6">
            <div>
                <label for="email" class="block text-sm font-medium text-gray-700 mb-2">Correo Electrónico</label>
                <div class="relative">
                    <span class="absolute inset-y-0 left-0 pl-3 flex items-center text-gray-400">
                        <i class="fas fa-envelope"></i>
                    </span>
                    <input type="email" id="email" name="email" required
                        class="block w-full pl-10 pr-3 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-vantec-accent focus:border-vantec-accent outline-none transition-all placeholder-gray-300"
                        placeholder="usuario@empresa.com">
                </div>
            </div>

            <button type="submit" id="submitBtn"
                class="w-full bg-vantec-primary text-white py-3 rounded-lg font-bold hover:bg-vantec-primary/90 hover:scale-[1.02] active:scale-[0.98] transition-all shadow-lg shadow-vantec-primary/20">
                Enviar Enlace
            </button>

            <div class="text-center">
                <a href="/login" class="text-sm text-vantec-accent hover:underline font-medium">Volver al Inicio de Sesión</a>
            </div>
        </form>

        <div class="p-6 bg-white text-center border-t border-gray-100">
            <p class="text-[10px] text-gray-400 uppercase tracking-widest mb-1">Capa de Seguridad L6 v3.5</p>
        </div>
    </div>

    <script>
        document.getElementById('recoveryForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const btn = document.getElementById('submitBtn');
            const alertBox = document.getElementById('alertBox');

            btn.disabled = true;
            btn.innerHTML = '<i class="fas fa-circle-notch fa-spin mr-2"></i> Procesando...';
            alertBox.classList.add('hidden');

            try {
                const response = await fetch('/api/v1/auth/recovery', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email })
                });

                const data = await response.json();
                
                if (response.ok) {
                    // 1. Feedback Visual Inmediato (Punto v3.6)
                    btn.classList.add('bg-green-500', 'hover:bg-green-600');
                    btn.classList.remove('bg-vantec-primary', 'hover:bg-vantec-primary/90');
                    btn.innerHTML = '<i class="fas fa-check-circle mr-2"></i> Solicitud Recibida';
                    
                    alertBox.innerText = data.message || "Si el correo está registrado, recibirá instrucciones en breve.";
                    alertBox.className = "mx-8 mt-6 p-4 rounded-lg text-sm text-center bg-blue-50 text-blue-700 border border-blue-100 block animate-pulse";
                    
                    // Ocultar formulario para enfoque en el mensaje
                    document.getElementById('recoveryForm').classList.add('opacity-50', 'pointer-events-none');

                    // 2. Temporizador de Redirección (DNA Vantec - 4 segundos)
                    console.log("[VCORE] Redirección programada en 4 segundos...");
                    setTimeout(() => {
                        window.location.href = '/login';
                    }, 4000);
                } else {
                    throw new Error(data.detail || "Error en la solicitud");
                }

            } catch (error) {
                alertBox.innerText = error.message;
                alertBox.className = "mx-8 mt-6 p-4 rounded-lg text-sm text-center bg-red-50 text-red-700 border border-red-100 block";
                btn.disabled = false;
                btn.innerText = 'Enviar Enlace';
            }
        });
    </script>
</body>
</html>
