<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Gestor CFDI - Vantec{% endblock %}</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        vantec: {
                            primary: '#1E3A5F',
                            accent: '#4EBCE9',
                        }
                    }
                }
            }
        }
    </script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');

        body {
            font-family: 'Inter', sans-serif;
        }

        /* VCORE L6: Fantasma Rojo Animation */
        @keyframes pulse-red-vcore {
            0% { transform: scale(1); text-shadow: 0 0 0 rgba(231, 76, 60, 0.7); }
            50% { transform: scale(1.2); text-shadow: 0 0 15px rgba(231, 76, 60, 0.5); }
            100% { transform: scale(1); text-shadow: 0 0 0 rgba(231, 76, 60, 0); }
        }
        .fa-ghost-red {
            color: #E74C3C !important;
            animation: pulse-red-vcore 1.5s infinite ease-in-out;
        }
    </style>
    {% block extra_head %}{% endblock %}
</head>

<body class="bg-gray-50 flex h-screen overflow-hidden">
    <!-- Sidebar -->
    <aside id="sidebar"
        class="bg-vantec-primary text-white w-64 flex-shrink-0 flex flex-col transition-all duration-300">
        <div class="p-6 flex items-center justify-between">
            <div class="flex items-center space-x-2">
                <div id="company-logo-container" class="flex items-center gap-3">
                    <img id="sidebar-logo" src="/static/img/Logo_Escudo_Sin_Fondo.png" alt="Logo"
                        style="height: 42px; width: auto; object-fit: contain;">
                    <div id="sidebar-brand-text" class="font-bold text-2xl tracking-tight">
                        <span class="text-[#4EBCE9]">V</span><span class="text-white">CORE</span>
                    </div>
                </div>

            </div>
            <button id="toggleSidebar" class="lg:hidden p-2 hover:bg-vantec-accent/20 rounded-lg">
                <i class="fas fa-bars"></i>
            </button>
        </div>

        <nav class="flex-grow mt-6 px-4 space-y-2">
            <a href="/dashboard"
                class="flex items-center space-x-3 p-3 rounded-lg hover:bg-vantec-accent transition-colors {% if request.url.path == '/dashboard' %}bg-vantec-accent{% endif %}">
                <i class="fas fa-chart-line w-5"></i>
                <span>Dashboard</span>
            </a>
            <a href="/cfdis"
                class="flex items-center space-x-3 p-3 rounded-lg hover:bg-vantec-accent transition-colors {% if request.url.path == '/cfdis' %}bg-vantec-accent{% endif %}">
                <i class="fas fa-file-invoice-dollar w-5"></i>
                <span>Emisión</span>
            </a>
            <!-- Recepción: Omitido en V1 (México/LATAM) -->
            <a href="/configuracion" id="nav-config"
                class="flex items-center space-x-3 p-3 rounded-lg hover:bg-vantec-accent transition-colors hidden {% if request.url.path == '/configuracion' %}bg-vantec-accent{% endif %}">
                <i class="fas fa-cog w-5"></i>
                <span>Configuración</span>
            </a>
        </nav>

        <div class="p-6 mt-auto">
            <div class="bg-white/10 rounded-xl p-4 border border-white/5 backdrop-blur-sm">
                 <p class="text-[10px] uppercase font-black tracking-widest text-[#4EBCE9] mb-1">VCore v1.0 (Latinoamérica)</p>
                 <p class="text-[10px] text-white/40">Sincronización SSoT Activa</p>
            </div>
        </div>
    </aside>

    <!-- Main Content -->
    <main class="flex-grow flex flex-col min-w-0">
        <!-- Top Navigation -->
        <header class="bg-white border-b border-gray-200 h-16 flex items-center justify-between px-8">
            <div class="flex items-center space-x-4">
                <div class="relative">
                    <label for="tenant-selector" class="sr-only">Seleccionar Entidad</label>
                    <select id="entity-selector"
                        class="bg-gray-100 border-none rounded-lg px-4 py-2 text-sm font-medium text-vantec-primary focus:ring-2 focus:ring-vantec-accent">
                        <option value="">Seleccionar Empresa</option>
                        {% for entidad in entidades_permitidas %}
                        <option value="{{ entidad.id }}">{{ entidad.rfc }}</option>
                        {% endfor %}
                    </select>
                </div>
                <button onclick="switchCompany()" class="text-vantec-accent hover:text-vantec-primary text-xs font-bold transition-colors ml-2 bg-vantec-accent/10 px-3 py-1.5 rounded-lg border border-vantec-accent/20">
                    <i class="fas fa-exchange-alt mr-2"></i>Cambiar de Empresa
                </button>
                <span class="text-gray-300 text-xl font-thin">|</span>
                <nav class="flex space-x-2 text-sm">
                    <span class="text-gray-500">Gestor</span>
                    <span class="text-gray-300">/</span>
                    <span class="text-vantec-primary font-medium">{% block breadcrumb %}Inicio{% endblock %}</span>
                </nav>
            </div>

            <div class="flex items-center space-x-6">
                <!-- User Profile & Context -->
                <div class="flex items-center space-x-3 pl-4 border-l border-gray-100">
                    <div class="text-right">
                        <p class="text-xs font-black text-vantec-primary uppercase tracking-tight" id="userName">Cargando...</p>
                        <button onclick="logout()" class="text-[10px] text-red-500 font-bold hover:underline py-0.5 px-0">Cerrar Sesión</button>
                    </div>
                    <div class="h-10 w-10 rounded-xl bg-vantec-primary flex items-center justify-center text-white font-black shadow-lg shadow-vantec-primary/20">
                         <i class="fas fa-user-circle fa-lg"></i>
                    </div>
                </div>
            </div>
        </header>

        <!-- Page Content -->
        <div class="flex-grow overflow-y-auto p-8 bg-gray-50">
            {% block content %}{% endblock %}
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="/static/js/auth.js?v=4.5.101"></script>
    <script src="/static/js/sentinel.js?v=3.5.0"></script>
    {% block scripts %}{% endblock %}
</body>

</html>
