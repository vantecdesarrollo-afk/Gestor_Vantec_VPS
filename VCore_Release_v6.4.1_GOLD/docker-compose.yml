version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: vantec_db
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-vantec_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-vantec_password}
      POSTGRES_DB: ${POSTGRES_DB:-gestor_cfdi}
    volumes:
      - postgres_data_v2:/var/lib/postgresql/data


  api:
    build: .
    container_name: vantec_api
    restart: always
    depends_on:
      - db
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-vantec_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-vantec_password}
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
      POSTGRES_DB: ${POSTGRES_DB:-gestor_cfdi}
      VANTEC_SECRET_KEY: ${VANTEC_SECRET_KEY:-VANTEC_SECRET_KEY_CHANGEME}
      STORAGE_PATH: "/storage"
      VANTEC_CFDI_ROOT: "/storage"
    volumes:
      - vantec_storage_v2:/storage # Mapeo crítico para Expedientes Virtuales
      - vantec_cfdi_v2:/app/Operacion_CFDI # Persistencia de CFDIs de Operación
      - vantec_logos_v2:/app/static/logos # Persistencia del logotipo de las empresas
    ports:
      - "8000:8000"


volumes:
  postgres_data_v2:
  vantec_storage_v2:
  vantec_cfdi_v2:
  vantec_logos_v2:

